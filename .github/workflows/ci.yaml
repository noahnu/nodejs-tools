---
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-24.04-arm
    if: (!contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

      - name: Run Format
        run: |
          yarn format:ci

      - name: Run Lint
        run: |
          yarn lint:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

      - name: Run Typecheck
        run: |
          yarn typecheck

  build:
    name: Build
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

      - name: Run Build
        run: |
          yarn build

  test:
    name: Test
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

      - name: Run Test
        run: |
          yarn test:ci

  preview:
    name: Preview
    runs-on: ubuntu-24.04-arm
    needs: [prepare]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: noahnu/.github/.github/actions/setup-node@main

      - name: Post Preview
        uses: monoweave/github-action-preview@ba0d968e9a4a7a783dddcff1a0e1952b29fe49a9 # v1.1.1

  required_checks:
    name: Required Checks
    needs:
      - prepare
      - build
      - lint
      - typecheck
      - test
    runs-on: ubuntu-24.04-arm
    if: always()
    steps:
      - name: Fail on error
        if: contains(needs.*.result, 'failure') || cancelled()
        run: exit 1
